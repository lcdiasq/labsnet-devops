name: "CodeQL Analysis"
run-name: "SECURITY: Análise profunda CodeQL | Step 02"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 1' # Roda automaticamente toda segunda-feira à meia-noite

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write # Necessário para publicar os alertas na aba Security

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Inicializa as ferramentas do CodeQL para a linguagem Python
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: python
        # O CodeQL para Python não precisa de passo de build, ele analisa o código fonte direto

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
