name: CI Pipeline

on:
  push:
    branches:
      - dev
      - feature/*
  pull_request:
    branches:
      - main

jobs:
  quality-security-test:
    runs-on: ubuntu-latest

    steps:
      # 🔹 1. Baixar código
      - name: Checkout código
        uses: actions/checkout@v3

      # 🔹 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 🔹 3. Instalar dependências + ferramentas
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 bandit pip-audit

      # 🔹 4. LINT (qualidade de código)
      - name: Rodar flake8 (lint)
        run: |
          flake8 app/

      # 🔹 5. SAST básico
      - name: Rodar Bandit
        run: |
          bandit -r app/

      # 🔹 6. Dependências vulneráveis
      - name: Rodar pip-audit
        run: |
          pip-audit

      # 🔹 7. Testes
      - name: Rodar testes
        env:
          PYTHONPATH: .
        run: |
          pytest

      # 🔹 8. Build Docker
      - name: Build Docker
        run: |
          docker build -t labsnet-api .